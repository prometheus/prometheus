---
name: CI
on:
  pull_request:
  push:
    branches: [main, 'release-*']
    tags: ['v*']

permissions:
  contents: read

jobs:
  test_go:
    name: Go tests
    runs-on: ubuntu-latest
    container:
      image: quay.io/prometheus/golang-builder:1.26-base
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: go test -v -count=500 -parallel 1 -run TestDiskFillingUpAfterDisablingOOO ./tsdb/
      - run: go test -v -count=500 -parallel 1 -run TestDiskFillingUpAfterDisablingOOO ./tsdb/
      - run: go test -v -count=500 -parallel 1 -run TestDiskFillingUpAfterDisablingOOO ./tsdb/
      - run: go test -v -count=500 -parallel 1 -run TestDiskFillingUpAfterDisablingOOO ./tsdb/
  test_go_windows:
    name: Go tests on Windows (${{ matrix.worker }})
    runs-on: windows-latest
    strategy:
      matrix:
        worker: [1, 2, 3]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
        with:
          go-version: 1.26.x
      - run: go test -v -count=50 -parallel 1 -run TestDiskFillingUpAfterDisablingOOO ./tsdb/
      - run: go test -v -count=50 -parallel 1 -run TestDiskFillingUpAfterDisablingOOO ./tsdb/
      - run: go test -v -count=50 -parallel 1 -run TestDiskFillingUpAfterDisablingOOO ./tsdb/
      - run: go test -v -count=50 -parallel 1 -run TestDiskFillingUpAfterDisablingOOO ./tsdb/
  test_go_i386:
    name: Go tests on i386 (${{ matrix.worker }})
    runs-on: ubuntu-latest
    container:
      image: quay.io/prometheus/golang-builder:1.26-base
    strategy:
      matrix:
        worker: [1, 2, 3]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: GOARCH=386 go test -v -count=50 -parallel 1 -run TestDiskFillingUpAfterDisablingOOO ./tsdb/
      - run: GOARCH=386 go test -v -count=50 -parallel 1 -run TestDiskFillingUpAfterDisablingOOO ./tsdb/
      - run: GOARCH=386 go test -v -count=50 -parallel 1 -run TestDiskFillingUpAfterDisablingOOO ./tsdb/
      - run: GOARCH=386 go test -v -count=50 -parallel 1 -run TestDiskFillingUpAfterDisablingOOO ./tsdb/
