global:
  external_labels:
    prometheus: demo
scrape_configs:
  - job_name: 'self'
    scrape_interval: 5s
    scrape_timeout: 5s
    static_configs:
      - targets: ['localhost:1235']
  - job_name: 'self-nh'
    scrape_interval: 5s
    scrape_timeout: 5s
    convert_classic_histograms_to_nhcb: true
    static_configs:
      - targets: [ 'localhost:1235' ]
