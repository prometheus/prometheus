components:
  schemas:
    BlockDesc:
      additionalProperties: false
      properties:
        maxTime:
          format: int64
          type: integer
        minTime:
          format: int64
          type: integer
        ulid:
          type: string
      required:
        - ulid
        - minTime
        - maxTime
      type: object
    BlockMeta:
      additionalProperties: false
      properties:
        compaction:
          $ref: "#/components/schemas/BlockMetaCompaction"
        maxTime:
          format: int64
          type: integer
        minTime:
          format: int64
          type: integer
        stats:
          $ref: "#/components/schemas/BlockStats"
        ulid:
          type: string
        version:
          format: int64
          type: integer
      required:
        - ulid
        - minTime
        - maxTime
        - compaction
        - version
      type: object
    BlockMetaCompaction:
      additionalProperties: false
      properties:
        deletable:
          type: boolean
        failed:
          type: boolean
        hints:
          items:
            type: string
          type:
            - array
            - "null"
        level:
          format: int64
          type: integer
        parents:
          items:
            $ref: "#/components/schemas/BlockDesc"
          type:
            - array
            - "null"
        sources:
          items:
            type: string
          type:
            - array
            - "null"
      required:
        - level
      type: object
    BlockStats:
      additionalProperties: false
      properties:
        numChunks:
          format: int64
          minimum: 0
          type: integer
        numFloatSamples:
          format: int64
          minimum: 0
          type: integer
        numHistogramSamples:
          format: int64
          minimum: 0
          type: integer
        numSamples:
          format: int64
          minimum: 0
          type: integer
        numSeries:
          format: int64
          minimum: 0
          type: integer
        numTombstones:
          format: int64
          minimum: 0
          type: integer
      type: object
    Error:
      additionalProperties: false
      properties:
        error:
          type: string
        errorType:
          type: string
        status:
          type: string
      required:
        - status
        - errorType
        - error
      type: object
    HeadStats:
      additionalProperties: false
      properties:
        chunkCount:
          format: int64
          type: integer
        maxTime:
          format: int64
          type: integer
        minTime:
          format: int64
          type: integer
        numLabelPairs:
          format: int64
          type: integer
        numSeries:
          format: int64
          minimum: 0
          type: integer
      required:
        - numSeries
        - numLabelPairs
        - chunkCount
        - minTime
        - maxTime
      type: object
    Metadata:
      additionalProperties: false
      properties:
        help:
          type: string
        type:
          type: string
        unit:
          type: string
      required:
        - type
        - unit
        - help
      type: object
    MetadataOutputBody:
      additionalProperties: false
      properties:
        data:
          additionalProperties:
            items:
              $ref: "#/components/schemas/Metadata"
            type:
              - array
              - "null"
          type: object
        status:
          type: string
      required:
        - status
        - data
      type: object
    PrometheusVersion:
      additionalProperties: false
      properties:
        branch:
          type: string
        buildDate:
          type: string
        buildUser:
          type: string
        goVersion:
          type: string
        revision:
          type: string
        version:
          type: string
      required:
        - version
        - revision
        - branch
        - buildUser
        - buildDate
        - goVersion
      type: object
    QueryOutputBody:
      additionalProperties: false
      properties:
        data:
          discriminator:
            mapping:
              matrix: "#/components/schemas/QueryData/oneOf/0"
              scalar: "#/components/schemas/QueryData/oneOf/2"
              string: "#/components/schemas/QueryData/oneOf/3"
              vector: "#/components/schemas/QueryData/oneOf/1"
            propertyName: resultType
          oneOf:
            - additionalProperties: false
              description: "Matrix result: array of time series with values or histograms"
              properties:
                result:
                  description: Array of time series, each with a metric and either values or histograms
                  items:
                    additionalProperties: false
                    properties:
                      histograms:
                        description: Array of histogram data points
                        type: array
                      metric:
                        description: Label set for this series
                        type: object
                      values:
                        description: Array of [timestamp, value] pairs
                        items:
                          maxItems: 2
                          minItems: 2
                          type: array
                        type: array
                    required:
                      - metric
                    type: object
                  type: array
                resultType:
                  description: The type of the result
                  enum:
                    - matrix
                  type: string
                stats:
                  description: Query statistics (optional)
                  type: object
              required:
                - resultType
                - result
              type: object
            - additionalProperties: false
              description: "Vector result: array of instant samples with value or histogram"
              properties:
                result:
                  description: Array of instant samples, each with a metric and either a value or histogram
                  items:
                    additionalProperties: false
                    properties:
                      histogram:
                        description: Histogram data
                        type: object
                      metric:
                        description: Label set for this sample
                        type: object
                      value:
                        description: Single [timestamp, value] pair
                        maxItems: 2
                        minItems: 2
                        type: array
                    required:
                      - metric
                    type: object
                  type: array
                resultType:
                  description: The type of the result
                  enum:
                    - vector
                  type: string
                stats:
                  description: Query statistics (optional)
                  type: object
              required:
                - resultType
                - result
              type: object
            - additionalProperties: false
              description: "Scalar result: single [timestamp, value] pair"
              properties:
                result:
                  description: "[timestamp, value] pair"
                  items:
                    oneOf:
                      - type: number
                      - type: string
                  maxItems: 2
                  minItems: 2
                  type: array
                resultType:
                  description: The type of the result
                  enum:
                    - scalar
                  type: string
                stats:
                  description: Query statistics (optional)
                  type: object
              required:
                - resultType
                - result
              type: object
            - additionalProperties: false
              description: "String result: single [timestamp, string_value] pair"
              properties:
                result:
                  description: "[timestamp, string_value] pair"
                  items:
                    oneOf:
                      - type: number
                      - type: string
                  maxItems: 2
                  minItems: 2
                  type: array
                resultType:
                  description: The type of the result
                  enum:
                    - string
                  type: string
                stats:
                  description: Query statistics (optional)
                  type: object
              required:
                - resultType
                - result
              type: object
        status:
          type: string
      required:
        - status
        - data
      type: object
    QueryPostInputBody:
      additionalProperties: false
      properties:
        limit:
          default: -1
          description: The maximum number of metrics to return.
          examples:
            - 100
          format: int64
          type: integer
        query:
          description: The PromQL query to execute.
          examples:
            - up
          type: string
        stats:
          description: Include query statistics in the response if not empty. Use 'all' for detailed per-step statistics.
          examples:
            - all
          type: string
        time:
          description: The evaluation timestamp (optional, defaults to current time).
          examples:
            - "2021-01-01T00:00:00Z"
          format: prometheus-time
          type: string
      required:
        - query
      type: object
    QueryRangeOutputBody:
      additionalProperties: false
      properties:
        data:
          discriminator:
            mapping:
              matrix: "#/components/schemas/QueryData/oneOf/0"
              scalar: "#/components/schemas/QueryData/oneOf/2"
              string: "#/components/schemas/QueryData/oneOf/3"
              vector: "#/components/schemas/QueryData/oneOf/1"
            propertyName: resultType
          oneOf:
            - additionalProperties: false
              description: "Matrix result: array of time series with values or histograms"
              properties:
                result:
                  description: Array of time series, each with a metric and either values or histograms
                  items:
                    additionalProperties: false
                    properties:
                      histograms:
                        description: Array of histogram data points
                        type: array
                      metric:
                        description: Label set for this series
                        type: object
                      values:
                        description: Array of [timestamp, value] pairs
                        items:
                          maxItems: 2
                          minItems: 2
                          type: array
                        type: array
                    required:
                      - metric
                    type: object
                  type: array
                resultType:
                  description: The type of the result
                  enum:
                    - matrix
                  type: string
                stats:
                  description: Query statistics (optional)
                  type: object
              required:
                - resultType
                - result
              type: object
            - additionalProperties: false
              description: "Vector result: array of instant samples with value or histogram"
              properties:
                result:
                  description: Array of instant samples, each with a metric and either a value or histogram
                  items:
                    additionalProperties: false
                    properties:
                      histogram:
                        description: Histogram data
                        type: object
                      metric:
                        description: Label set for this sample
                        type: object
                      value:
                        description: Single [timestamp, value] pair
                        maxItems: 2
                        minItems: 2
                        type: array
                    required:
                      - metric
                    type: object
                  type: array
                resultType:
                  description: The type of the result
                  enum:
                    - vector
                  type: string
                stats:
                  description: Query statistics (optional)
                  type: object
              required:
                - resultType
                - result
              type: object
            - additionalProperties: false
              description: "Scalar result: single [timestamp, value] pair"
              properties:
                result:
                  description: "[timestamp, value] pair"
                  items:
                    oneOf:
                      - type: number
                      - type: string
                  maxItems: 2
                  minItems: 2
                  type: array
                resultType:
                  description: The type of the result
                  enum:
                    - scalar
                  type: string
                stats:
                  description: Query statistics (optional)
                  type: object
              required:
                - resultType
                - result
              type: object
            - additionalProperties: false
              description: "String result: single [timestamp, string_value] pair"
              properties:
                result:
                  description: "[timestamp, string_value] pair"
                  items:
                    oneOf:
                      - type: number
                      - type: string
                  maxItems: 2
                  minItems: 2
                  type: array
                resultType:
                  description: The type of the result
                  enum:
                    - string
                  type: string
                stats:
                  description: Query statistics (optional)
                  type: object
              required:
                - resultType
                - result
              type: object
        status:
          type: string
      required:
        - status
        - data
      type: object
    QueryRangePostInputBody:
      additionalProperties: false
      properties:
        end:
          description: The end time of the query.
          examples:
            - "2021-01-01T00:00:00Z"
          format: prometheus-time
          type: string
        limit:
          default: -1
          description: The maximum number of metrics to return.
          examples:
            - 100
          format: int64
          type: integer
        query:
          description: The query to execute.
          examples:
            - up
          type: string
        start:
          description: The start time of the query.
          examples:
            - "2021-01-01T00:00:00Z"
          format: prometheus-time
          type: string
        step:
          description: The step size of the query.
          examples:
            - 1h
          format: duration
          type: string
      required:
        - start
        - end
        - step
        - query
      type: object
    RuntimeInfo:
      additionalProperties: false
      properties:
        CWD:
          type: string
        GODEBUG:
          type: string
        GOGC:
          type: string
        GOMAXPROCS:
          format: int64
          type: integer
        GOMEMLIMIT:
          format: int64
          type: integer
        corruptionCount:
          format: int64
          type: integer
        goroutineCount:
          format: int64
          type: integer
        hostname:
          type: string
        lastConfigTime:
          format: date-time
          type: string
        reloadConfigSuccess:
          type: boolean
        serverTime:
          format: date-time
          type: string
        startTime:
          format: date-time
          type: string
        storageRetention:
          type: string
      required:
        - startTime
        - CWD
        - hostname
        - serverTime
        - reloadConfigSuccess
        - lastConfigTime
        - corruptionCount
        - goroutineCount
        - GOMAXPROCS
        - GOMEMLIMIT
        - GOGC
        - GODEBUG
        - storageRetention
      type: object
    StatusBuildInfoOutputBody:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/PrometheusVersion"
        status:
          type: string
      required:
        - status
        - data
      type: object
    StatusConfigData:
      additionalProperties: false
      properties:
        yaml:
          description: The YAML configuration of the Prometheus server.
          type: string
      required:
        - yaml
      type: object
    StatusConfigOutputBody:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/StatusConfigData"
        status:
          type: string
      required:
        - status
        - data
      type: object
    StatusFlagsOutputBody:
      additionalProperties: false
      properties:
        data:
          additionalProperties:
            type: string
          type: object
        status:
          type: string
      required:
        - status
        - data
      type: object
    StatusRuntimeInfoOutputBody:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/RuntimeInfo"
        status:
          type: string
      required:
        - status
        - data
      type: object
    StatusTSDBBlocksData:
      additionalProperties: false
      properties:
        blocks:
          items:
            $ref: "#/components/schemas/BlockMeta"
          type:
            - array
            - "null"
      required:
        - blocks
      type: object
    StatusTSDBBlocksOutputBody:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/StatusTSDBBlocksData"
        status:
          type: string
      required:
        - status
        - data
      type: object
    StatusTSDBOutputBody:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/TSDBStatus"
        status:
          type: string
      required:
        - status
        - data
      type: object
    StatusWALReplayData:
      additionalProperties: false
      properties:
        current:
          description: Current segment number being replayed.
          format: int64
          type: integer
        max:
          description: Maximum segment number.
          format: int64
          type: integer
        min:
          description: Minimum segment number.
          format: int64
          type: integer
      required:
        - min
        - max
        - current
      type: object
    StatusWALReplayOutputBody:
      additionalProperties: false
      properties:
        data:
          $ref: "#/components/schemas/StatusWALReplayData"
        status:
          type: string
      required:
        - status
        - data
      type: object
    TSDBStat:
      additionalProperties: false
      properties:
        name:
          type: string
        value:
          format: int64
          minimum: 0
          type: integer
      required:
        - name
        - value
      type: object
    TSDBStatus:
      additionalProperties: false
      properties:
        headStats:
          $ref: "#/components/schemas/HeadStats"
        labelValueCountByLabelName:
          items:
            $ref: "#/components/schemas/TSDBStat"
          type:
            - array
            - "null"
        memoryInBytesByLabelName:
          items:
            $ref: "#/components/schemas/TSDBStat"
          type:
            - array
            - "null"
        seriesCountByLabelValuePair:
          items:
            $ref: "#/components/schemas/TSDBStat"
          type:
            - array
            - "null"
        seriesCountByMetricName:
          items:
            $ref: "#/components/schemas/TSDBStat"
          type:
            - array
            - "null"
      required:
        - headStats
        - seriesCountByMetricName
        - labelValueCountByLabelName
        - memoryInBytesByLabelName
        - seriesCountByLabelValuePair
      type: object
info:
  contact:
    name: Prometheus Community
    url: https://prometheus.io/community/
  description: Prometheus is an Open-Source monitoring system with a dimensional data model, flexible query language, efficient time series database and modern alerting approach.
  title: Prometheus API
  version: ""
openapi: 3.1.0
paths:
  /metadata:
    get:
      operationId: get-metadata
      parameters:
        - description: The maximum number of metrics to return.
          example: 100
          explode: false
          in: query
          name: limit
          schema:
            default: -1
            description: The maximum number of metrics to return.
            examples:
              - 100
            format: int64
            type: integer
        - description: The maximum number of metadata entries per metric to return.
          example: 10
          explode: false
          in: query
          name: limitPerMetric
          schema:
            default: -1
            description: The maximum number of metadata entries per metric to return.
            examples:
              - 10
            format: int64
            type: integer
        - description: A metric name to filter metadata for. All metric metadata is retrieved if left empty.
          example: go_goroutines
          explode: false
          in: query
          name: metric
          schema:
            description: A metric name to filter metadata for. All metric metadata is retrieved if left empty.
            examples:
              - go_goroutines
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
      summary: Get metadata
  /query:
    get:
      operationId: query
      parameters:
        - description: The maximum number of metrics to return.
          example: 100
          explode: false
          in: query
          name: limit
          schema:
            default: -1
            description: The maximum number of metrics to return.
            examples:
              - 100
            format: int64
            type: integer
        - description: The evaluation timestamp (optional, defaults to current time).
          example: "2021-01-01T00:00:00Z"
          explode: false
          in: query
          name: time
          schema:
            description: The evaluation timestamp (optional, defaults to current time).
            examples:
              - "2021-01-01T00:00:00Z"
            format: prometheus-time
            type: string
        - description: The PromQL query to execute.
          example: up
          explode: false
          in: query
          name: query
          required: true
          schema:
            description: The PromQL query to execute.
            examples:
              - up
            type: string
        - description: Include query statistics in the response if not empty. Use 'all' for detailed per-step statistics.
          example: all
          explode: false
          in: query
          name: stats
          schema:
            description: Include query statistics in the response if not empty. Use 'all' for detailed per-step statistics.
            examples:
              - all
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
    post:
      operationId: query-post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryPostInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
  /query_range:
    get:
      operationId: query-range
      parameters:
        - description: The maximum number of metrics to return.
          example: 100
          explode: false
          in: query
          name: limit
          schema:
            default: -1
            description: The maximum number of metrics to return.
            examples:
              - 100
            format: int64
            type: integer
        - description: The start time of the query.
          example: "2021-01-01T00:00:00Z"
          explode: false
          in: query
          name: start
          required: true
          schema:
            description: The start time of the query.
            examples:
              - "2021-01-01T00:00:00Z"
            format: prometheus-time
            type: string
        - description: The end time of the query.
          example: "2021-01-01T00:00:00Z"
          explode: false
          in: query
          name: end
          required: true
          schema:
            description: The end time of the query.
            examples:
              - "2021-01-01T00:00:00Z"
            format: prometheus-time
            type: string
        - description: The step size of the query.
          example: 1h
          explode: false
          in: query
          name: step
          required: true
          schema:
            description: The step size of the query.
            examples:
              - 1h
            format: duration
            type: string
        - description: The query to execute.
          example: up
          explode: false
          in: query
          name: query
          required: true
          schema:
            description: The query to execute.
            examples:
              - up
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryRangeOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
    post:
      operationId: query-range-post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QueryRangePostInputBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryRangeOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
  /status/buildinfo:
    get:
      operationId: get-status-buildinfo
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusBuildInfoOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
      summary: Get status buildinfo
  /status/config:
    get:
      operationId: get-status-config
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusConfigOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
      summary: Get status config
  /status/flags:
    get:
      operationId: get-status-flags
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusFlagsOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
      summary: Get status flags
  /status/runtimeinfo:
    get:
      operationId: get-status-runtimeinfo
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusRuntimeInfoOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
      summary: Get status runtimeinfo
  /status/tsdb:
    get:
      operationId: status-tsdb
      parameters:
        - description: The maximum number of items to return per category.
          example: 10
          explode: false
          in: query
          name: limit
          schema:
            default: 10
            description: The maximum number of items to return per category.
            examples:
              - 10
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusTSDBOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
  /status/tsdb/blocks:
    get:
      operationId: status-tsdb-blocks
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusTSDBBlocksOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
  /status/walreplay:
    get:
      operationId: get-status-walreplay
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusWALReplayOutputBody"
          description: OK
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error
      summary: Get status walreplay
servers:
  - url: http://localhost:9090/api/v1
