version: v1
name: buf.build/prometheus/prometheus
lint:
  ignore_only:
    ENUM_VALUE_PREFIX:
      - remote.proto
      - types.proto
      - io/prometheus/client/metrics.proto
    ENUM_ZERO_VALUE_SUFFIX:
      - remote.proto
      - types.proto
      - io/prometheus/client/metrics.proto
    PACKAGE_DIRECTORY_MATCH:
      - remote.proto
      - types.proto
    PACKAGE_VERSION_SUFFIX:
      - remote.proto
      - types.proto
      - io/prometheus/client/metrics.proto
breaking:
  ignore_only:
    # metrics.proto no longer imports gogoproto/gogo.proto — its gogo annotations
    # became wiresmith options — so buf breaking against upstream main (which
    # still carries that annotation-only import) reports the file as deleted.
    # The removal does not change the wire schema.
    FILE_NO_DELETE:
      - gogoproto/gogo.proto
deps:
  - buf.build/grafana/wiresmith
